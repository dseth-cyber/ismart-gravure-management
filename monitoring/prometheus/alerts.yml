groups:
  - name: backend_alerts
    interval: 30s
    rules:
      - alert: DatabaseDown
        expr: probe_success{job="backend"} == 0 or absent(probe_success{job="backend"})
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Database is down"
          description: "Database has been unreachable for more than 30 seconds."

      - alert: RedisDown
        expr: probe_success{job="backend"} == 0 or absent(probe_success{job="backend"})
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis has been unreachable for more than 30 seconds."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status_code=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate"
          description: "API error rate is {{ $value | humanizePercentage }} over the last 5 minutes (threshold: 5%)."

      - alert: HighDiskUsage
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage > 90%"
          description: "Disk usage is {{ $value | humanizePercentage }} free (threshold: < 10% free)."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage > 90%"
          description: "Memory usage is {{ $value | humanizePercentage }} (threshold: > 90%)."

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_ms_bucket[5m])) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency (P95 > 1s)"
          description: "P95 latency is {{ $value }}ms over the last 5 minutes (threshold: 1000ms)."

  - name: business_kpi_alerts
    interval: 30s
    rules:
      - alert: ExpiredInkBatches
        expr: ink_batches_total{status="expired"} > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Expired ink batches detected"
          description: "There are {{ $value }} expired ink batch(es). Action required: dispose and reorder."

      - alert: NearExpiryInkBatches
        expr: ink_batches_total{status="nearExpiry"} > 3
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Multiple ink batches near expiry"
          description: "{{ $value }} ink batch(es) are near expiry. Consider prioritizing usage."

      - alert: HighPendingJobs
        expr: jobs_total{status="pending"} > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of pending production jobs"
          description: "{{ $value }} production job(s) are pending. Review capacity and scheduling."

      - alert: JobsOnHold
        expr: jobs_total{status="hold"} > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Production jobs on hold"
          description: "{{ $value }} production job(s) are on hold. Requires management review."

      - alert: CylindersInRepair
        expr: cylinders_total{status="repair"} > 3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Multiple cylinders in repair"
          description: "{{ $value }} cylinder(s) are in repair status. May impact production capacity."

      - alert: NoActiveOrders
        expr: orders_total{status="active"} == 0 and orders_total{status="pending"} == 0
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "No active or pending orders"
          description: "No active or pending sales orders detected. Business may be idle."

      - alert: HighQueueFailureRate
        expr: rate(queue_jobs_total{status="failed"}[5m]) / (rate(queue_jobs_total{status="completed"}[5m]) + rate(queue_jobs_total{status="failed"}[5m])) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High queue job failure rate (>10%)"
          description: "Queue job failure rate is {{ $value | humanizePercentage }} over the last 5 minutes (threshold: 10%)."
