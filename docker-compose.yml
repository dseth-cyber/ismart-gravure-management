name: ismart-gravure-management

services:
  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: gravure-frontend-app
    ports:
      - "3000:3000"
    command: sh -c "rm -rf .next && npm run dev -- --port 3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - ./shared:/shared
    depends_on:
      - postgres
      - redis

  # Future consolidated backend service
  backend:
    build:
      context: ./backend
      target: dev
    container_name: gravure-backend-api
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://gravure_user:gravure_password@postgres:5432/gravure_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super_secret_jwt_key
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - ./shared:/shared
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:18-alpine
    container_name: gravure-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: gravure_db
      POSTGRES_USER: gravure_user
      POSTGRES_PASSWORD: gravure_password
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    container_name: gravure-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  frontend_node_modules:
  backend_node_modules:
  postgres_data:
  redis_data:
