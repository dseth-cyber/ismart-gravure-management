name: ismart-gravure-management

services:
  caddy:
    image: caddy:alpine
    container_name: gravure-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy
      - internal
    depends_on:
      - frontend
      - backend
      - modsecurity
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: gravure-frontend-app
    ports:
      - "3000:3000"
    command: sh -c "rm -rf .next && npm run dev -- --port 3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
      ALLOWED_DEV_ORIGINS: "http://192.168.30.77:3000,http://192.168.1.13:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - ./shared:/shared
    networks:
      - internal
    depends_on:
      - postgres
      - redis

  backend:
    build:
      context: ./backend
      target: dev
    container_name: gravure-backend-api
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      LOG_FORMAT: text
      CORS_ORIGINS: http://localhost:3000,http://localhost:5000,https://localhost,https://api.localhost
      API_KEY_ENABLED: "true"
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@ismart-gravure.com
      STORAGE_PROVIDER: minio
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_BUCKET: gravure-files
      UPLOAD_MAX_SIZE: "10485760"
    secrets:
      - db_url
      - db_password
      - redis_url
      - jwt_secret
      - jwt_refresh_secret
      - api_keys
      - minio_access_key
      - minio_secret_key
      - redis_password
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - ./shared:/shared
    networks:
      - internal
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:18-alpine
    container_name: gravure-postgres
    environment:
      POSTGRES_DB: gravure_db
      POSTGRES_USER: gravure_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gravure_user -d gravure_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    secrets:
      - db_password
    networks:
      - internal

  redis:
    image: redis:8-alpine
    container_name: gravure-redis
    command: ["sh", "-c", "redis-server --requirepass \"$$(cat /run/secrets/redis_password)\""]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a \"$$(cat /run/secrets/redis_password)\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    secrets:
      - redis_password
    networks:
      - internal

  prometheus:
    image: prom/prometheus:latest
    container_name: gravure-prometheus
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - internal
    depends_on:
      - backend

  loki:
    image: grafana/loki:latest
    container_name: gravure-loki
    volumes:
      - ./monitoring/loki:/etc/loki
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - internal

  grafana:
    image: grafana/grafana:latest
    container_name: gravure-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_password
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SERVER_ROOT_URL=https://grafana.localhost
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    networks:
      - internal
    secrets:
      - grafana_password
    depends_on:
      - prometheus
      - loki

  alertmanager:
    image: prom/alertmanager:latest
    container_name: gravure-alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - internal

  mailhog:
    image: mailhog/mailhog:latest
    container_name: gravure-mailhog
    networks:
      - internal

  minio:
    image: minio/minio:latest
    container_name: gravure-minio
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: minio-NMSsqosoLtELMGQKxXnzuA
      MINIO_ROOT_PASSWORD: FZucOV4BkcvdBNCFOL-Dr2YSC4fw109h
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  node_exporter:
    image: prom/node-exporter:latest
    container_name: gravure-node-exporter
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro
    networks:
      - internal
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: gravure-promtail
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      - loki

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: gravure-postgres-exporter
    environment:
      DATA_SOURCE_URI: "postgres:5432/gravure_db?sslmode=disable"
      DATA_SOURCE_USER: gravure_user
      DATA_SOURCE_PASS: 06ead744cde36ccf76e86225e9e61df4
    networks:
      - internal
    depends_on:
      - postgres
    restart: unless-stopped

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: gravure-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: xRZ5BGoP3CvMTifEqL8tIQdsyYmkSNOD
    networks:
      - internal
    depends_on:
      - redis
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: gravure-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - DAC_READ_SEARCH
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      - postgres

  modsecurity:
    image: owasp/modsecurity-crs:apache
    container_name: gravure-modsecurity
    environment:
      PROXY: "1"
      BACKEND: http://backend:5000
      PARANOIA: "1"
      ANOMALY_INBOUND: "5"
      ANOMALY_OUTBOUND: "4"
      BLOCKING_PARANOIA: "1"
      TIMEOUT: "60"
      LOGLEVEL: warn
      PROXY_ERROR_OVERRIDE: "off"
      PROXY_PRESERVE_HOST: "on"
    volumes:
      - ./modsecurity/modsecurity-override.conf:/etc/modsecurity.d/modsecurity-override.conf
    networks:
      - internal
    depends_on:
      - backend
    restart: unless-stopped

  blackbox_exporter:
    image: prom/blackbox-exporter:latest
    container_name: gravure-blackbox-exporter
    volumes:
      - ./monitoring/prometheus/blackbox.yml:/etc/blackbox_exporter/blackbox.yml
    command: '--config.file=/etc/blackbox_exporter/blackbox.yml'
    networks:
      - internal
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: gravure-cloudflared
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN:-}
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
      - TUNNEL_METRICS=localhost:43679
    networks:
      - proxy
      - internal
    restart: unless-stopped
    profiles:
      - production
    depends_on:
      - caddy

secrets:
  db_url:
    file: ./secrets/db_url.txt
  db_password:
    file: ./secrets/db_password.txt
  redis_url:
    file: ./secrets/redis_url.txt
  redis_password:
    file: ./secrets/redis_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  jwt_refresh_secret:
    file: ./secrets/jwt_refresh_secret.txt
  api_keys:
    file: ./secrets/api_keys.txt
  minio_access_key:
    file: ./secrets/minio_access_key.txt
  minio_secret_key:
    file: ./secrets/minio_secret_key.txt
  grafana_password:
    file: ./secrets/grafana_password.txt

volumes:
  frontend_node_modules:
  backend_node_modules:
  postgres_data:
  redis_data:
  prometheus_data:
  loki_data:
  grafana_data:
  minio_data:
  caddy_data:
  caddy_config:

networks:
  proxy:
    driver: bridge
  internal:
    driver: bridge
