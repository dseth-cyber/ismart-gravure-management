name: Trivy Container Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'

jobs:
  trivy-scan:
    name: Trivy CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        id: build
        continue-on-error: true
        run: |
          docker build --no-cache --progress=plain \
            -f backend/Dockerfile \
            -t gravure-backend:ci . 2>&1 | tee build-output.txt || true
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> build-exit-code.txt
          {
            echo "--- docker images ---"
            docker images
            echo "--- docker image inspect ---"
            docker image inspect gravure-backend:ci || echo "IMAGE_NOT_FOUND"
          } >> build-exit-code.txt 2>&1

      - name: Upload diagnostic files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diag-files
          path: |
            build-output.txt
            build-exit-code.txt

      - name: Check image exists
        id: check
        run: |
          if docker image inspect gravure-backend:ci >/dev/null 2>&1; then
            echo "image_exists=yes" >> "$GITHUB_OUTPUT"
          else
            echo "image_exists=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Trivy
        if: steps.check.outputs.image_exists == 'yes'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: gravure-backend:ci
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt
