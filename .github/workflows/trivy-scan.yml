name: Trivy Container Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'

jobs:
  trivy-scan:
    name: Trivy CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull base image
        run: docker pull node:24-bookworm-slim

      - name: Run Trivy scan
        run: |
          docker pull aquasec/trivy:latest
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image --severity HIGH,CRITICAL --exit-code 0 node:24-bookworm-slim 2>&1 | tee trivy-report.txt
          echo "=== CVE Summary ==="
          grep -E "(HIGH|CRITICAL)" trivy-report.txt || echo "No CVEs found"
          echo "=== Full report saved to artifact ==="
