name: Trivy Container Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'

jobs:
  trivy-scan:
    name: Trivy CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test simple FROM
        run: printf 'FROM node:24-bookworm-slim\nRUN node --version\n' | docker build --progress=plain -t test1 -f- .
      - name: Test npm install
        run: printf 'FROM node:24-bookworm-slim\nWORKDIR /app\nCOPY package*.json ./\nRUN npm install\n' | docker build --progress=plain -t test2 -f- backend/
      - name: Test full Dockerfile
        run: docker build --progress=plain -f backend/Dockerfile -t gravure-backend:ci backend/

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: gravure-backend:ci
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          output: trivy-report.txt

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.txt
