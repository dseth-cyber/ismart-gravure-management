name: Trivy Container Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'

jobs:
  trivy-scan:
    name: Trivy CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build deps stage only
        id: deps
        continue-on-error: true
        run: |
          docker build --no-cache --progress=plain \
            --target deps \
            -f backend/Dockerfile \
            -t gravure-deps:ci . 2>&1 | tee build-output.txt || true
          echo "DEPS_EXIT=${PIPESTATUS[0]}" > build-result.txt
          docker image inspect gravure-deps:ci >> build-result.txt 2>&1 || echo "DEPS_IMAGE_NOT_FOUND" >> build-result.txt
          echo "---" >> build-result.txt
          docker images --filter reference=gravure-* >> build-result.txt

      - name: Build full image
        id: full
        continue-on-error: true
        run: |
          docker build --no-cache --progress=plain \
            -f backend/Dockerfile \
            -t gravure-backend:ci . 2>&1 | tee -a build-output.txt || true
          echo "FULL_EXIT=${PIPESTATUS[0]}" >> build-result.txt
          {
            echo "--- docker images (all) ---"
            docker images --all
            echo "--- docker image inspect ---"
            docker image inspect gravure-backend:ci 2>&1 || echo "IMAGE_NOT_FOUND"
          } >> build-result.txt

      - name: Upload diagnostic files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diag-files
          path: |
            build-output.txt
            build-result.txt

      - name: Check image exists
        id: check
        run: |
          if docker image inspect gravure-backend:ci >/dev/null 2>&1; then
            echo "image_exists=yes" >> "$GITHUB_OUTPUT"
          else
            echo "image_exists=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Trivy
        if: steps.check.outputs.image_exists == 'yes'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: gravure-backend:ci
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt
