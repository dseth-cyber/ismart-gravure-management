name: Trivy Container Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'

jobs:
  trivy-scan:
    name: Trivy CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build deps
        run: docker build --progress=plain --target=deps -f backend/Dockerfile -t gravure-deps:ci .
      - name: Test node + tsc
        run: printf 'FROM gravure-deps:ci\nRUN node --version\nRUN npm --version\nCOPY backend/ .\nRUN npm run build\n' | docker build --progress=plain -t gravure-tsc -f- .
      - name: Test prisma
        run: printf 'FROM gravure-deps:ci\nCOPY backend/ .\nRUN ls -la prisma/\nRUN npx prisma --version\n' | docker build --progress=plain -t gravure-prisma-test -f- .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: gravure-backend:ci
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          output: trivy-report.txt

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.txt
