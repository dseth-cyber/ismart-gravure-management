name: Trivy Container Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'

jobs:
  trivy-scan:
    name: Trivy CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build full image
        run: |
          docker build --no-cache --progress=plain \
            -f backend/Dockerfile \
            -t gravure-backend:ci .

      - name: Scan with Trivy
        id: scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasecurity/trivy:latest \
            image --severity HIGH,CRITICAL \
            --exit-code 0 \
            --format table \
            gravure-backend:ci \
            > trivy-report.txt 2>&1
          echo "Trivy completed"

      - name: Show results
        if: always()
        run: |
          echo "## Trivy Scan Results" >> $env:GITHUB_STEP_SUMMARY
          cat trivy-report.txt >> $env:GITHUB_STEP_SUMMARY

      - name: Fail on CVEs
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasecurity/trivy:latest \
            image --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format table \
            gravure-backend:ci
