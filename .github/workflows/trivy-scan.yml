name: Trivy Container Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'

jobs:
  trivy-scan:
    name: Trivy CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build deps
        run: docker build --progress=plain --target=deps -f backend/Dockerfile -t gravure-deps:ci .
      - name: Test COPY operations
        run: printf 'FROM gravure-deps:ci\nCOPY shared/ /shared\nCOPY backend/ .\nRUN echo "COPY works"\n' | docker build --progress=plain -t gravure-copy-test -f- .
      - name: Test prisma generate
        run: printf 'FROM gravure-copy-test\nRUN npx prisma generate\n' | docker build --progress=plain -t gravure-prisma -f- .
      - name: Build full image
        if: success()
        run: docker build --progress=plain -f backend/Dockerfile -t gravure-backend:ci .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: gravure-backend:ci
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          output: trivy-report.txt

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.txt
