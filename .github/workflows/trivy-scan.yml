name: Trivy Container Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'

jobs:
  trivy-scan:
    name: Trivy CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build full image
        run: |
          docker build --no-cache --progress=plain -f backend/Dockerfile \
            -t gravure-backend:ci . 2>&1

      - name: Run Trivy scan
        id: trivy
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: gravure-backend:ci
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          output: trivy-report.txt

      - name: Show scan results
        if: always()
        run: |
          cat trivy-report.txt >> $env:GITHUB_STEP_SUMMARY
          echo "Trivy exit code: ${{ steps.trivy.outcome }}" >> $env:GITHUB_STEP_SUMMARY

      - name: Fail on CVEs
        if: steps.trivy.outcome == 'failure'
        run: |
          echo "::error::Trivy found HIGH/CRITICAL vulnerabilities"
          exit 1
