# ModSecurity override for ismart-gravure-management
# Disable JSON body parsing error (rule 200002) — backend handles JSON validation via Zod
SecRuleRemoveById 200002

# Disable request body processor error (rule 200001) — allow JSON through proxy
SecRuleRemoveById 200001

# Allow PUT and DELETE methods (needed by REST API endpoints like /api/v1/layouts/me)
SecAction "id:1001,phase:1,pass,nolog,setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT DELETE PATCH'"

# Reduce paranoia for specific paths that require complex JSON bodies
SecRule REQUEST_URI "@beginsWith /api/v1/auth/login" \
    "id:1000,phase:1,pass,nolog,ctl:requestBodyProcessor=URLENCODED"
